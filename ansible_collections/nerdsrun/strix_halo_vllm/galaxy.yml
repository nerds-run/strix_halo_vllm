documentation: https://github.com/nerdsrun/amdllmv/tree/main/docs
homepage: https://github.com/nerdsrun/amdllmv
issues: https://github.com/nerdsrun/amdllmv/issues
tags:
  - infrastructure
  - linux
  - tools
  - amd
  - vllm
  - llama_cpp
  - vulkan
  - strix_halo
  - gpu
  - ai
  - fedora
dependencies:
  ansible.posix: ">=1.5.0"
readme: README.md
build_ignore:
  - molecule
  - docs
  - "*.tar.gz"
