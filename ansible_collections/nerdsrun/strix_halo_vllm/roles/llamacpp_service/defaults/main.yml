---
# ==========================================================================
# llamacpp_service defaults
# ==========================================================================
# Container image: llama.cpp with Vulkan (RADV) backend for Strix Halo.
# Uses Vulkan instead of ROCm/HIP to work around the Qwen 3.5 hang bug
# (https://github.com/ROCm/ROCm/issues/6027).
llamacpp_image: "docker.io/kyuz0/amd-strix-halo-toolboxes:vulkan-radv"
llamacpp_container_name: "llamacpp-server"
llamacpp_enabled: true
llamacpp_host: "0.0.0.0"
llamacpp_port: 8080

# --------------------------------------------------------------------------
# Model profiles — select with llamacpp_model_profile
# --------------------------------------------------------------------------
# big:      Qwen3.5-122B-A10B — most powerful, reasoning/vision/coding (~77GB, ~22 tok/s)
# coder:    Qwen3-Coder-30B-A3B — coding specialist, tool-use, agentic (~20GB, ~55-65 tok/s)
# fast:     Qwen3.5-35B-A3B — fast reasoning/vision/coding (~20GB, ~50-55 tok/s)
# nemotron: Nemotron-3-Nano-30B-A3B — hybrid Mamba-Transformer MoE, coding/agentic/reasoning (~20GB)
# super:    Nemotron-3-Super-120B-A12B — hybrid LatentMoE (Mamba-2+MoE+Attn), reasoning/planning (~84GB)
#           WARNING: ~84GB at Q4 leaves minimal headroom on 128GB — do not run alongside other models
#           NOTE: Requires llama.cpp build ≥8351 (mamba-base.cpp assertion fix, issue #20570)
# minimax:  MiniMax-M2.7 — 229B MoE / 10B active, long-context agentic + reasoning (~108GB)
#           WARNING: ~108GB at UD-IQ4_XS — tightest fit on 128GB, do not run alongside other models
#           NOTE: Vulkan backend only — do NOT use CUDA 13.2 (produces gibberish per Unsloth docs)
llamacpp_model_profile: "big"

llamacpp_model_profiles:
  big:
    repo: "unsloth/Qwen3.5-122B-A10B-GGUF"
    file: "UD-Q4_K_XL/Qwen3.5-122B-A10B-UD-Q4_K_XL-00001-of-00003.gguf"
    include: "*UD-Q4_K_XL*"
    ctx_size: 131072
    temp: 0.6
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    jinja: false
    repeat_penalty: 0
  coder:
    repo: "unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF"
    file: "UD-Q4_K_XL/Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf"
    include: "*UD-Q4_K_XL*"
    ctx_size: 32768
    temp: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    jinja: true
    repeat_penalty: 1.05
  fast:
    repo: "unsloth/Qwen3.5-35B-A3B-GGUF"
    file: "UD-Q4_K_XL/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf"
    include: "*UD-Q4_K_XL*"
    ctx_size: 131072
    temp: 0.6
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    jinja: true
    repeat_penalty: 1.05
  nemotron:
    # Hybrid Mamba-Transformer MoE (128 experts, 6 active per token)
    # Requires llama.cpp build ≥8351 — earlier builds crash with an assertion
    # in mamba-base.cpp (https://github.com/ggml-org/llama.cpp/issues/20570)
    repo: "unsloth/Nemotron-3-Nano-30B-A3B-GGUF"
    file: "Nemotron-3-Nano-30B-A3B-UD-Q4_K_XL.gguf"
    include: "*UD-Q4_K_XL*"
    ctx_size: 131072
    temp: 0.6
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    jinja: true
    repeat_penalty: 1.05
    extra_args:
      - "--reasoning-format deepseek"
      - "--reasoning on"
  super:
    # Hybrid LatentMoE (Mamba-2 + MoE + Attention), Multi-Token Prediction
    # 120B total / 12B active per token — requires ~84GB at Q4_K_XL
    # WARNING: Leaves minimal headroom on 128GB — do not run alongside other models
    # Requires llama.cpp build ≥8351 (mamba-base.cpp assertion fix, issue #20570)
    # TODO: MTP (Multi-Token Prediction) layers may be in GGUF — enable with
    #       --speculative-config flags once llama.cpp supports MTP for this arch
    repo: "unsloth/Nemotron-3-Super-120B-A12B-GGUF"
    file: "UD-Q3_K_XL/NVIDIA-Nemotron-3-Super-120B-A12B-UD-Q3_K_XL-00001-of-00003.gguf"
    include: "*UD-Q3_K_XL*"
    ctx_size: 131072
    temp: 0.6
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    jinja: true
    repeat_penalty: 1.05
    batch_size: 2048
    cache_type_k: "q4_0"
    cache_type_v: "q4_0"
    extra_args:
      - "--reasoning-format deepseek"
      - "--reasoning auto"
      - "--reasoning-budget 256"
      - "-np 1"
  minimax:
    # MiniMax-M2.7 — 229B MoE / 10B active per token
    # UD-IQ4_XS weights alone are ~108GB — tightest fit in 128GB unified memory
    # WARNING: Do not run alongside other containerized models on 128GB systems
    # NOTE: Unsloth docs warn NOT to use CUDA 13.2 to run these GGUFs (gibberish output).
    #       This deployment uses the Vulkan backend, so we're already safe.
    # Tool calling: the MiniMax-recommended vLLM flags --tool-call-parser
    #   and --reasoning-parser are NOT supported by llama-server. llama.cpp
    #   drives tool calls through --jinja + the chat template embedded in
    #   the GGUF; reasoning blocks come out natively in the assistant stream.
    repo: "unsloth/MiniMax-M2.7-GGUF"
    file: "UD-IQ4_XS/MiniMax-M2.7-UD-IQ4_XS-00001-of-00004.gguf"
    include: "*UD-IQ4_XS*"
    ctx_size: 49152
    temp: 1.0
    top_p: 0.95
    top_k: 40
    min_p: 0.0
    jinja: true
    repeat_penalty: 0
    batch_size: 4096
    cache_type_k: "q4_0"
    cache_type_v: "q4_0"
    extra_args:
      - "--reasoning-format auto"
      - "--cache-reuse 256"
      - "--cache-ram 2048"
      - "--slot-save-path /models/slot-cache"
      - "--metrics"
      - "-np 1"

llamacpp_model_dir: "~/models"

# --------------------------------------------------------------------------
# Shared inference flags (apply to all profiles)
# --------------------------------------------------------------------------
llamacpp_ngl: 999
llamacpp_flash_attn: true
llamacpp_no_mmap: true
llamacpp_batch_size: 512
llamacpp_thinking_enabled: true
llamacpp_log_disable: true
llamacpp_extra_args: []

# KV cache quantization (set to q8_0 or q4_0 for longer context windows)
llamacpp_cache_type_k: "q8_0"
llamacpp_cache_type_v: "q8_0"

# API key (disabled by default — llama.cpp has no built-in auth)
llamacpp_api_key_enabled: false
llamacpp_api_key_value: "local-dev-key"

# Networking
firewall_open_llamacpp_port: false

# Shared variables (duplicated from host_prereqs to allow standalone use)
strix_halo_target_user: "{{ ansible_user_id }}"
huggingface_cache_dir: "~/.cache/huggingface"
hf_token: ""
